name: Gerar JuntarPDFs.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install pypdf pyinstaller

      - name: Gerar .exe
        run: pyinstaller --onefile --windowed --name "JuntarPDFs" juntar_pdfs.py

      - name: Publicar .exe como artefato
        uses: actions/upload-artifact@v4
        with:
          name: JuntarPDFs
          path: dist/JuntarPDFs.exe
