name: Build EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Instalar Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          pip install pypdf pyinstaller

      - name: Gerar EXE
        run: |
          pyinstaller --onefile --windowed --name "Gerenciador_PDFs" Gerenciador_PDFs.py

      - name: Publicar como Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Gerenciador_PDFs v1.0.${{ github.run_number }}"
          files: dist/Gerenciador_PDFs.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
